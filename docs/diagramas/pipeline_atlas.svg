<svg viewBox="0 0 320 520" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="320" height="520" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <text x="160" y="28" text-anchor="middle" font-size="11" fill="#6b7fa8" font-family="Helvetica, sans-serif" letter-spacing="2">PIPELINE ANALÍTICO</text>

  <!-- Node 1: CadÚnico -->
  <rect x="60" y="44" width="200" height="44" rx="8" fill="#1a2744"/>
  <text x="160" y="61" text-anchor="middle" font-size="11" fill="#90a8c8" font-family="Helvetica, sans-serif" letter-spacing="1">FONTE</text>
  <text x="160" y="78" text-anchor="middle" font-size="14" fill="white" font-family="Helvetica, sans-serif" font-weight="bold">CadÚnico</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="88" x2="160" y2="108" stroke="#4a7bc8" stroke-width="2"/>
  <polygon points="155,106 165,106 160,114" fill="#4a7bc8"/>

  <!-- Node 2: Tratamento -->
  <rect x="60" y="116" width="200" height="44" rx="8" fill="#2c4a8a"/>
  <text x="160" y="133" text-anchor="middle" font-size="11" fill="#90a8c8" font-family="Helvetica, sans-serif" letter-spacing="1">PROCESSAMENTO</text>
  <text x="160" y="150" text-anchor="middle" font-size="14" fill="white" font-family="Helvetica, sans-serif" font-weight="bold">Tratamento</text>

  <!-- Arrow 2 -->
  <line x1="160" y1="160" x2="160" y2="180" stroke="#4a7bc8" stroke-width="2"/>
  <polygon points="155,178 165,178 160,186" fill="#4a7bc8"/>

  <!-- Node 3: Indicadores -->
  <rect x="60" y="188" width="200" height="44" rx="8" fill="#2c4a8a"/>
  <text x="160" y="205" text-anchor="middle" font-size="11" fill="#90a8c8" font-family="Helvetica, sans-serif" letter-spacing="1">CÁLCULO</text>
  <text x="160" y="222" text-anchor="middle" font-size="14" fill="white" font-family="Helvetica, sans-serif" font-weight="bold">Indicadores IVS-H</text>

  <!-- Arrow 3 -->
  <line x1="160" y1="232" x2="160" y2="252" stroke="#4a7bc8" stroke-width="2"/>
  <polygon points="155,250 165,250 160,258" fill="#4a7bc8"/>

  <!-- Node 4: Índices (destaque) -->
  <rect x="44" y="260" width="232" height="52" rx="8" fill="#1a2744" stroke="#2a9d8f" stroke-width="2"/>
  <text x="160" y="279" text-anchor="middle" font-size="11" fill="#2a9d8f" font-family="Helvetica, sans-serif" letter-spacing="1">ÍNDICES</text>
  <text x="160" y="299" text-anchor="middle" font-size="13" fill="white" font-family="Helvetica, sans-serif" font-weight="bold">IVS-H · IVCAD · IPST-H</text>

  <!-- Arrow 4 -->
  <line x1="160" y1="312" x2="160" y2="332" stroke="#2a9d8f" stroke-width="2"/>
  <polygon points="155,330 165,330 160,338" fill="#2a9d8f"/>

  <!-- Node 5: Territorialização -->
  <rect x="60" y="340" width="200" height="44" rx="8" fill="#2a9d8f"/>
  <text x="160" y="357" text-anchor="middle" font-size="11" fill="white" font-family="Helvetica, sans-serif" letter-spacing="1" opacity="0.8">141 LOTEAMENTOS</text>
  <text x="160" y="374" text-anchor="middle" font-size="14" fill="white" font-family="Helvetica, sans-serif" font-weight="bold">Territorialização</text>

  <!-- Arrow 5 -->
  <line x1="160" y1="384" x2="160" y2="404" stroke="#2a9d8f" stroke-width="2"/>
  <polygon points="155,402 165,402 160,410" fill="#2a9d8f"/>

  <!-- Node 6: Painéis -->
  <rect x="60" y="412" width="200" height="44" rx="8" fill="#1a2744" stroke="#2a9d8f" stroke-width="1"/>
  <text x="160" y="429" text-anchor="middle" font-size="11" fill="#2a9d8f" font-family="Helvetica, sans-serif" letter-spacing="1">ENTREGÁVEL</text>
  <text x="160" y="446" text-anchor="middle" font-size="13" fill="white" font-family="Helvetica, sans-serif" font-weight="bold">Painéis · Leitura pública</text>

  <!-- Footer -->
  <text x="160" y="498" text-anchor="middle" font-size="9" fill="#9aacca" font-family="Helvetica, sans-serif">Atlas Social de Hortolândia · SMIDS/DIAE · 2026</text>

</svg>
